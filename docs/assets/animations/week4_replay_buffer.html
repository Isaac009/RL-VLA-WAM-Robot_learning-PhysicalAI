<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replay Buffer Animation v0 Placeholder</title>
<style>
  :root {
    --action: #f97316;
    --error: #dc2626;
    --baseline: #4b5563;
    --muted: #f3f4f6;
    --ink: #1f2937;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    color: var(--ink);
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  main {
    width: min(640px, 100%);
    text-align: center;
  }

  h1 {
    color: var(--baseline);
    font-size: clamp(22px, 4vw, 30px);
  }

  .note {
    color: var(--error);
    font-weight: 800;
  }

  .buffer {
    margin: 24px auto;
    padding: 24px;
    border: 3px solid var(--baseline);
    border-radius: 8px;
    background: var(--muted);
    color: var(--baseline);
    font-size: clamp(16px, 4vw, 24px);
    font-weight: 800;
  }

  .transition {
    color: var(--action);
  }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation: none !important;
      transition: none !important;
    }
  }
</style>
</head>
<body>
<main aria-labelledby="title">
  <h1 id="title">Replay Buffer v0 Placeholder</h1>
  <p class="note">TODO: Animate transitions entering a buffer and random batches being sampled.</p>
  <div class="buffer" aria-label="Replay buffer placeholder">
    Buffer stores <span class="transition">(s, a, r, s')</span>
  </div>
</main>
</body>
</html>
