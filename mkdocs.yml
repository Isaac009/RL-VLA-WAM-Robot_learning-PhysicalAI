site_name: RL-VLA-WAM Robot Learning Course
site_description: A community course from classical reinforcement learning to robot learning, VLA policies, and World Action Models.
site_url: https://isaac009.github.io/RL-VLA-WAM-Robot_learning-PhysicalAI/
repo_url: https://github.com/Isaac009/RL-VLA-WAM-Robot_learning-PhysicalAI
repo_name: Isaac009/RL-VLA-WAM-Robot_learning-PhysicalAI

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Course:
      - Syllabus: syllabus.md
      - Lesson Plan: lesson-plan.md
      - RL Instructor Commitment: instructor-rl.md
  - Weeks:
      - Week 01 - MDPs and Baselines:
          - Lecture: lectures/week-01.md
          - Lab 01 - Inspect a Tiny MDP: labs/lab-01.md
          - Quiz: quizzes/week-01.md
      - Week 02 - Tabular Q-Learning:
          - Lecture: lectures/week-02.md
          - Lab 02 - Inspect a Q-Table: labs/lab-02.md
          - Quiz: quizzes/week-02.md
  - Reference:
      - Resources: resources.md
      - WAM Research Notes: wam-research-notes.md
  - Community:
      - Contribute: contribute.md
      - Artifact Generator Brief: artifact-generator-brief.md
      - Course Assets: assets/README.md
      - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
